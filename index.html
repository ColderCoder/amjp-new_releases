<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>AMJP Releases</title>
    <link rel="preconnect" href="https://is1-ssl.mzstatic.com">
    <link rel="stylesheet" href="assets/styles.20260524b.css">
    <script type="module" src="assets/app.20260524e.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="https://music.apple.com/jp/new?l=en" target="_blank" rel="noreferrer">
        <span class="brand-mark">AM</span>
        <span>
          <strong>AMJP</strong>
          <small>Apple Music Japan</small>
        </span>
      </a>

      <div class="toolbar">
        <label class="search-shell">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"></path>
          </svg>
          <input id="filter" type="search" autocomplete="off" placeholder="Filter releases">
        </label>

        <button class="icon-button" id="view-toggle" type="button" title="Toggle view" aria-label="Toggle view">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 5h16M4 12h16M4 19h16"></path>
          </svg>
        </button>

        <button class="icon-button" id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36-6.36-1.42 1.42M7.06 16.94l-1.42 1.42m12.72 0-1.42-1.42M7.06 7.06 5.64 5.64"></path>
            <circle cx="12" cy="12" r="4"></circle>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="summary" aria-labelledby="page-title">
        <div>
          <p class="eyebrow" id="section-label">Apple Music JP</p>
          <h1 id="page-title">Recent Releases</h1>
        </div>
        <div class="meta-strip">
          <time id="generated-at" datetime=""></time>
          <a id="source-link" href="https://music.apple.com/jp/new?l=en" target="_blank" rel="noreferrer">Source</a>
          <a id="json-link" href="./data/jp.json" target="_blank" rel="noreferrer">JSON</a>
        </div>
      </section>

      <section class="status" id="status" hidden></section>
      <section class="release-grid" id="releases" aria-live="polite"></section>
    </main>

    <template id="release-template">
      <article class="release-card">
        <a class="artwork-link" target="_blank" rel="noreferrer">
          <img class="artwork" alt="" loading="lazy" decoding="async">
          <span class="artwork-placeholder" aria-hidden="true">AM</span>
        </a>
        <div class="release-body">
          <a class="release-title" target="_blank" rel="noreferrer"></a>
          <p class="release-artist"></p>
          <time class="release-date" datetime=""></time>
          <div class="release-actions"></div>
        </div>
      </article>
    </template>
  </body>
</html>
